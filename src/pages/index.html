<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="robots" content="noindex" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Set Password | The Curious Case of Ankan Ghosh??</title>

    <style>
      :root {
        --paper: #faf7ee;
        --paper-deep: #efe4cd;
        --ink: #2c251d;
        --muted: #746b62;
        --red-ink: #901714;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--paper);
        color: var(--ink);
        font-family: Georgia, serif;
        padding: 24px;
      }

      .identity-box {
        width: min(100%, 440px);
        border: 2px solid var(--ink);
        background: var(--paper-deep);
        padding: 28px;
        box-shadow: 8px 8px 0 var(--ink);
      }

      h1 {
        margin: 0 0 12px;
        color: var(--red-ink);
        font-size: 2rem;
        line-height: 1.1;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      label {
        display: block;
        margin-top: 16px;
        font-weight: bold;
      }

      input {
        width: 100%;
        margin-top: 6px;
        padding: 12px;
        border: 1px solid var(--ink);
        background: var(--paper);
        color: var(--ink);
        font: inherit;
      }

      button {
        width: 100%;
        margin-top: 20px;
        border: 1px solid var(--ink);
        background: var(--ink);
        color: var(--paper);
        padding: 12px 16px;
        cursor: pointer;
        font-family: monospace;
      }

      button:hover {
        background: var(--red-ink);
        border-color: var(--red-ink);
      }

      .message {
        margin-top: 16px;
        font-family: monospace;
        font-size: 0.9rem;
      }

      .message.error {
        color: var(--red-ink);
      }

      .message.success {
        color: green;
      }

      .hidden {
        display: none;
      }

      a {
        color: var(--red-ink);
      }
    </style>
  </head>

  <body>
    <main class="identity-box">
      <h1 id="pageTitle">Set your password</h1>

      <p id="pageIntro">
        Enter a password below to finish setting up your CMS login.
      </p>

      <form id="identityForm">
        <label for="password">New password</label>
        <input
          id="password"
          name="password"
          type="password"
          minlength="6"
          required
        />

        <label for="confirmPassword">Confirm password</label>
        <input
          id="confirmPassword"
          name="confirmPassword"
          type="password"
          minlength="6"
          required
        />

        <button type="submit" id="submitBtn">Set password</button>
      </form>

      <p class="message" id="message"></p>

      <p>
        <a href="/">← Back to homepage</a>
      </p>
    </main>

    <script>
      import GoTrue from "gotrue-js";

      const auth = new GoTrue({
        APIUrl: `${window.location.origin}/.netlify/identity`,
        audience: "",
        setCookie: false,
      });

      const form = document.getElementById("identityForm");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");
      const message = document.getElementById("message");
      const pageTitle = document.getElementById("pageTitle");
      const pageIntro = document.getElementById("pageIntro");
      const submitBtn = document.getElementById("submitBtn");

      function getToken(name) {
        const hash = window.location.hash || "";
        const search = window.location.search || "";

        const hashParams = new URLSearchParams(hash.replace("#", ""));
        const searchParams = new URLSearchParams(search.replace("?", ""));

        return hashParams.get(name) || searchParams.get(name);
      }

      const inviteToken = getToken("invite_token");
      const recoveryToken = getToken("recovery_token");

      if (recoveryToken) {
        pageTitle.textContent = "Reset your password";
        pageIntro.textContent = "Enter your new password below.";
        submitBtn.textContent = "Reset password";
      }

      if (!inviteToken && !recoveryToken) {
        form.classList.add("hidden");
        message.className = "message error";
        message.textContent =
          "No invite or recovery token found. Open this page using the invite/reset token link.";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const password = passwordInput.value.trim();
        const confirmPassword = confirmPasswordInput.value.trim();

        if (password !== confirmPassword) {
          message.className = "message error";
          message.textContent = "Passwords do not match.";
          return;
        }

        if (password.length < 6) {
          message.className = "message error";
          message.textContent = "Password must be at least 6 characters.";
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Please wait...";

        try {
          if (inviteToken) {
            await auth.acceptInvite(inviteToken, password, true);
          }

          if (recoveryToken) {
            const user = await auth.recover(recoveryToken, true);
            await user.update({ password });
          }

          message.className = "message success";
          message.textContent = "Password set successfully. Redirecting to CMS...";

          setTimeout(() => {
            window.location.href = "/admin/";
          }, 1200);
        } catch (error) {
          console.error(error);

          message.className = "message error";
          message.textContent =
            error?.json?.msg ||
            error?.message ||
            "Something went wrong. The token may be expired or already used.";

          submitBtn.disabled = false;
          submitBtn.textContent = inviteToken ? "Set password" : "Reset password";
        }
      });
    </script>
  </body>
</html>
