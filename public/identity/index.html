<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Identity Login</title>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #faf7ee;
      color: #2c251d;
      font-family: Georgia, serif;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 420px;
      border: 2px solid #2c251d;
      padding: 28px;
      background: #efe4cd;
      box-shadow: 8px 8px 0 #2c251d;
    }

    h1 {
      color: #901714;
      margin-top: 0;
      line-height: 1.1;
    }

    p {
      line-height: 1.6;
    }

    button {
      border: 1px solid #2c251d;
      background: #2c251d;
      color: #faf7ee;
      padding: 10px 16px;
      cursor: pointer;
      font-family: monospace;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Opening Identity...</h1>
    <p>
      If the password window does not appear automatically, click the button below.
    </p>

    <button id="openIdentity">Open login</button>
  </div>

  <script>
    const identity = window.netlifyIdentity;

    function hasToken(name) {
      return window.location.hash.includes(name) || window.location.search.includes(name);
    }

    const isInvite = hasToken("invite_token");
    const isRecovery = hasToken("recovery_token");
    const isConfirmation = hasToken("confirmation_token");
    const isEmailChange = hasToken("email_change_token");

    function openCorrectModal() {
      if (!identity) {
        console.error("Netlify Identity widget not found.");
        return;
      }

      if (isInvite) {
        identity.open("signup");
        return;
      }

      identity.open("login");
    }

    if (identity) {
      identity.on("init", function (user) {
        if (!user && (isInvite || isRecovery || isConfirmation || isEmailChange)) {
          openCorrectModal();
        }
      });

      identity.on("login", function () {
        window.location.href = "/admin/";
      });

      identity.init();

      setTimeout(openCorrectModal, 800);
    }

    document.getElementById("openIdentity").addEventListener("click", openCorrectModal);
  </script>
</body>
</html>
